vrrp_script chk_pg {
    script \"/usr/local/bin/check_pg.sh\"
    interval 2
    weight 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0
    virtual_router_id 51
    priority 100
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass keepalived_secret
    }
    virtual_ipaddress {
        10.0.0.100
    }
    track_script {
        chk_pg
    }
}
